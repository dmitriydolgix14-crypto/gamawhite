<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛏️ MINECRAFT CLICKER 💎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 50%, #7CB342 50%, #558B2F 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            image-rendering: pixelated;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 4px solid #8B4513;
            box-shadow: 0 8px 0 #654321;
        }
        
        h1 {
            font-size: 3em;
            color: #FFD700;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border: 3px solid #555;
            font-size: 1.2em;
            text-shadow: 2px 2px 0 #000;
        }
        
        .game-area {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .mining-area {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 4px solid #8B4513;
            box-shadow: 0 8px 0 #654321;
        }
        
        .blocks-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .block {
            aspect-ratio: 1;
            border: 3px solid #000;
            cursor: pointer;
            font-size: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            position: relative;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3), inset 4px 4px 0 rgba(255,255,255,0.3);
        }
        
        .block:hover {
            transform: scale(0.95);
            filter: brightness(1.2);
        }
        
        .block:active {
            transform: scale(0.9);
        }
        
        .block.dirt { background: #8B4513; }
        .block.stone { background: #808080; }
        .block.coal { background: #2F2F2F; }
        .block.iron { background: #D4AF97; }
        .block.gold { background: #FFD700; }
        .block.diamond { background: #00CED1; }
        .block.emerald { background: #50C878; }
        
        .block.bedrock { 
            background: #1a1a1a; 
            cursor: not-allowed;
        }
        
        .health {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .inventory {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 4px solid #8B4513;
            box-shadow: 0 8px 0 #654321;
        }
        
        .inventory h2 {
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .inventory-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            margin-bottom: 8px;
            border: 2px solid #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }
        
        .inventory-item span:first-child {
            font-size: 1.3em;
        }
        
        .crafting {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 4px solid #8B4513;
            box-shadow: 0 8px 0 #654321;
            margin-top: 20px;
        }
        
        .crafting h2 {
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .craft-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .craft-btn {
            background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: 3px solid #1B5E20;
            padding: 15px;
            font-size: 1.1em;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #1B5E20;
        }
        
        .craft-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
        
        .craft-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1B5E20;
        }
        
        .craft-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .upgrades {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 4px solid #8B4513;
            box-shadow: 0 8px 0 #654321;
            margin-top: 20px;
        }
        
        .upgrades h2 {
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .upgrade-btn {
            background: linear-gradient(180deg, #2196F3 0%, #1565C0 100%);
            color: white;
            border: 3px solid #0D47A1;
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            font-size: 1em;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #0D47A1;
        }
        
        .upgrade-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
        
        .upgrade-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0D47A1;
        }
        
        .upgrade-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFD700;
            padding: 20px;
            font-size: 1.3em;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 4px 0 #B8860B;
            max-width: 300px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 2em;
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }
        
        @keyframes floatUp {
            to {
                transform: translateY(-100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ MINECRAFT CLICKER 💎</h1>
            <div class="stats">
                <div class="stat">💰 Монеты: <span id="coins">0</span></div>
                <div class="stat">⛏️ Сила: <span id="power">1</span></div>
                <div class="stat">🎯 Уровень: <span id="level">1</span></div>
                <div class="stat">⚡ Удачи: <span id="luck">1</span>%</div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="mining-area">
                <div class="health">❤️ Прочность блока: <span id="blockHealth">10</span></div>
                <div class="blocks-grid" id="blocksGrid"></div>
            </div>
            
            <div>
                <div class="inventory">
                    <h2>📦 ИНВЕНТАРЬ</h2>
                    <div id="inventoryList"></div>
                </div>
                
                <div class="crafting">
                    <h2>🔨 КРАФТ</h2>
                    <div class="craft-buttons">
                        <button class="craft-btn" onclick="craft('pickaxe')">
                            ⛏️ Кирка<br>
                            <small>10 камня</small>
                        </button>
                        <button class="craft-btn" onclick="craft('sword')">
                            ⚔️ Меч<br>
                            <small>5 железа</small>
                        </button>
                        <button class="craft-btn" onclick="craft('armor')">
                            🛡️ Броня<br>
                            <small>8 железа</small>
                        </button>
                        <button class="craft-btn" onclick="craft('torch')">
                            🔦 Факел<br>
                            <small>1 уголь</small>
                        </button>
                    </div>
                </div>
                
                <div class="upgrades">
                    <h2>⬆️ УЛУЧШЕНИЯ</h2>
                    <button class="upgrade-btn" onclick="upgrade('power')">
                        💪 Сила +1<br>
                        <small>Цена: <span id="powerCost">50</span> 💰</small>
                    </button>
                    <button class="upgrade-btn" onclick="upgrade('luck')">
                        🍀 Удача +1%<br>
                        <small>Цена: <span id="luckCost">100</span> 💰</small>
                    </button>
                    <button class="upgrade-btn" onclick="upgrade('auto')">
                        🤖 Авто-копание<br>
                        <small>Цена: <span id="autoCost">500</span> 💰</small>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let coins = 0;
        let power = 1;
        let level = 1;
        let luck = 1;
        let blockHealth = 10;
        let maxBlockHealth = 10;
        let currentBlock = null;
        let autoMining = false;
        
        let powerCost = 50;
        let luckCost = 100;
        let autoCost = 500;
        
        const inventory = {
            dirt: 0,
            stone: 0,
            coal: 0,
            iron: 0,
            gold: 0,
            diamond: 0,
            emerald: 0,
            pickaxe: 0,
            sword: 0,
            armor: 0,
            torch: 0
        };
        
        const blocks = [
            { type: 'dirt', emoji: '🟫', health: 10, reward: 1, rarity: 50 },
            { type: 'stone', emoji: '⬜', health: 20, reward: 2, rarity: 30 },
            { type: 'coal', emoji: '⬛', health: 30, reward: 5, rarity: 15 },
            { type: 'iron', emoji: '🔲', health: 50, reward: 10, rarity: 8 },
            { type: 'gold', emoji: '🟨', health: 70, reward: 25, rarity: 4 },
            { type: 'diamond', emoji: '💎', health: 100, reward: 50, rarity: 2 },
            { type: 'emerald', emoji: '💚', health: 150, reward: 100, rarity: 1 }
        ];
        
        function getRandomBlock() {
            const random = Math.random() * 100 + luck;
            let cumulative = 0;
            
            for (let i = blocks.length - 1; i >= 0; i--) {
                cumulative += blocks[i].rarity;
                if (random >= 100 - cumulative) {
                    return blocks[i];
                }
            }
            
            return blocks[0];
        }
        
        function generateBlocks() {
            const grid = document.getElementById('blocksGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 15; i++) {
                const block = getRandomBlock();
                const blockEl = document.createElement('div');
                blockEl.className = `block ${block.type}`;
                blockEl.innerHTML = block.emoji;
                blockEl.dataset.type = block.type;
                blockEl.dataset.health = block.health;
                blockEl.dataset.reward = block.reward;
                blockEl.onclick = () => mineBlock(blockEl, block);
                grid.appendChild(blockEl);
            }
        }
        
        function mineBlock(element, block) {
            if (currentBlock && currentBlock !== element) {
                currentBlock.dataset.health = blocks.find(b => b.type === currentBlock.dataset.type).health;
            }
            
            currentBlock = element;
            let health = parseInt(element.dataset.health);
            health -= power;
            element.dataset.health = health;
            
            blockHealth = health;
            maxBlockHealth = blocks.find(b => b.type === block.type).health;
            updateUI();
            
            createParticle(element, block.emoji);
            
            if (health <= 0) {
                const reward = parseInt(element.dataset.reward);
                coins += reward;
                inventory[block.type]++;
                
                showNotification(`+${reward} 💰 | +1 ${block.emoji}`);
                
                element.style.animation = 'none';
                element.offsetHeight;
                element.style.animation = 'floatUp 0.5s ease-out';
                
                setTimeout(() => {
                    const newBlock = getRandomBlock();
                    element.className = `block ${newBlock.type}`;
                    element.innerHTML = newBlock.emoji;
                    element.dataset.type = newBlock.type;
                    element.dataset.health = newBlock.health;
                    element.dataset.reward = newBlock.reward;
                    element.onclick = () => mineBlock(element, newBlock);
                    element.style.animation = '';
                    
                    blockHealth = newBlock.health;
                    maxBlockHealth = newBlock.health;
                    currentBlock = null;
                    updateUI();
                }, 500);
                
                checkLevelUp();
            }
        }
        
        function createParticle(element, emoji) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = emoji;
            
            const rect = element.getBoundingClientRect();
            particle.style.left = rect.left + rect.width / 2 + 'px';
            particle.style.top = rect.top + rect.height / 2 + 'px';
            
            document.body.appendChild(particle);
            
            setTimeout(() => particle.remove(), 1000);
        }
        
        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }
        
        function checkLevelUp() {
            const newLevel = Math.floor(coins / 100) + 1;
            if (newLevel > level) {
                level = newLevel;
                showNotification(`🎉 УРОВЕНЬ ${level}! 🎉`);
                updateUI();
            }
        }
        
        function craft(item) {
            const recipes = {
                pickaxe: { stone: 10, reward: 'pickaxe', bonus: 2 },
                sword: { iron: 5, reward: 'sword', bonus: 3 },
                armor: { iron: 8, reward: 'armor', bonus: 1 },
                torch: { coal: 1, reward: 'torch', bonus: 0 }
            };
            
            const recipe = recipes[item];
            let canCraft = true;
            
            for (let material in recipe) {
                if (material !== 'reward' && material !== 'bonus') {
                    if (inventory[material] < recipe[material]) {
                        canCraft = false;
                        break;
                    }
                }
            }
            
            if (canCraft) {
                for (let material in recipe) {
                    if (material !== 'reward' && material !== 'bonus') {
                        inventory[material] -= recipe[material];
                    }
                }
                
                inventory[recipe.reward]++;
                power += recipe.bonus;
                
                showNotification(`✅ Создано: ${getItemEmoji(recipe.reward)} +${recipe.bonus} силы!`);
                updateUI();
            } else {
                showNotification('❌ Недостаточно материалов!');
            }
        }
        
        function getItemEmoji(item) {
            const emojis = {
                dirt: '🟫',
                stone: '⬜',
                coal: '⬛',
                iron: '🔲',
                gold: '🟨',
                diamond: '💎',
                emerald: '💚',
                pickaxe: '⛏️',
                sword: '⚔️',
                armor: '🛡️',
                torch: '🔦'
            };
            return emojis[item] || '❓';
        }
        
        function upgrade(type) {
            if (type === 'power' && coins >= powerCost) {
                coins -= powerCost;
                power++;
                powerCost = Math.floor(powerCost * 1.5);
                showNotification('💪 Сила увеличена!');
            } else if (type === 'luck' && coins >= luckCost) {
                coins -= luckCost;
                luck++;
                luckCost = Math.floor(luckCost * 1.8);
                showNotification('🍀 Удача увеличена!');
            } else if (type === 'auto' && coins >= autoCost && !autoMining) {
                coins -= autoCost;
                autoMining = true;
                startAutoMining();
                showNotification('🤖 Авто-копание активировано!');
            } else {
                showNotification('❌ Недостаточно монет!');
                return;
            }
            
            updateUI();
        }
        
        function startAutoMining() {
            setInterval(() => {
                if (autoMining) {
                    const blocks = document.querySelectorAll('.block');
                    const randomBlock = blocks[Math.floor(Math.random() * blocks.length)];
                    const blockType = randomBlock.dataset.type;
                    const block = window.blocks.find(b => b.type === blockType);
                    if (block) {
                        mineBlock(randomBlock, block);
                    }
                }
            }, 2000);
        }
        
        function updateUI() {
            document.getElementById('coins').textContent = coins;
            document.getElementById('power').textContent = power;
            document.getElementById('level').textContent = level;
            document.getElementById('luck').textContent = luck;
            document.getElementById('blockHealth').textContent = blockHealth > 0 ? blockHealth : maxBlockHealth;
            
            document.getElementById('powerCost').textContent = powerCost;
            document.getElementById('luckCost').textContent = luckCost;
            document.getElementById('autoCost').textContent = autoCost;
            
            const inventoryList = document.getElementById('inventoryList');
            inventoryList.innerHTML = '';
            
            for (let item in inventory) {
                if (inventory[item] > 0) {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'inventory-item';
                    itemEl.innerHTML = `
                        <span>${getItemEmoji(item)} ${item}</span>
                        <span>x${inventory[item]}</span>
                    `;
                    inventoryList.appendChild(itemEl);
                }
            }
        }
        
        window.blocks = blocks;
        generateBlocks();
        updateUI();
        
        // Сохранение прогресса
        setInterval(() => {
            localStorage.setItem('minecraftSave', JSON.stringify({
                coins, power, level, luck, inventory, powerCost, luckCost, autoCost, autoMining
            }));
        }, 5000);
        
        // Загрузка прогресса
        const saved = localStorage.getItem('minecraftSave');
        if (saved) {
            const data = JSON.parse(saved);
            coins = data.coins || 0;
            power = data.power || 1;
            level = data.level || 1;
            luck = data.luck || 1;
            powerCost = data.powerCost || 50;
            luckCost = data.luckCost || 100;
            autoCost = data.autoCost || 500;
            autoMining = data.autoMining || false;
            
            if (data.inventory) {
                for (let item in data.inventory) {
                    inventory[item] = data.inventory[item];
                }
            }
            
            if (autoMining) {
                startAutoMining();
            }
            
            updateUI();
        }
    </script>
</body>
</html>
