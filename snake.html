<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Эпичная Змейка для Юми 💝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            color: white;
        }
        
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-wrapper {
            background: rgba(20, 20, 40, 0.9);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.5), 0 0 100px rgba(255, 20, 147, 0.3);
            border: 2px solid rgba(138, 43, 226, 0.5);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 3em;
            text-align: center;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 110, 196, 0.5);
        }
        
        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        .greeting {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ffd700;
            min-height: 50px;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 15px rgba(255, 215, 0, 1), 0 0 30px rgba(255, 215, 0, 0.5);
            font-weight: bold;
            padding: 10px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        #gameCanvas {
            border: 3px solid #7873f5;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(120, 115, 245, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.5);
            background: #000;
            display: block;
            margin: 0 auto;
        }
        
        .info {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 20px;
        }
        
        .score, .highscore {
            background: linear-gradient(135deg, rgba(120, 115, 245, 0.3), rgba(255, 110, 196, 0.3));
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1.4em;
            border: 2px solid rgba(120, 115, 245, 0.5);
            box-shadow: 0 0 20px rgba(120, 115, 245, 0.3);
            transition: all 0.3s;
        }
        
        .score:hover, .highscore:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(120, 115, 245, 0.6);
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
            font-size: 1em;
            opacity: 0.7;
            color: #aaa;
        }
        
        #gameOver {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.95), rgba(255, 20, 147, 0.95));
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 100px rgba(138, 43, 226, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.3);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        #gameOver h2 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .congratulations {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            z-index: 999;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.8);
            animation: slideIn 0.5s ease-out;
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.5);
            min-width: 400px;
        }
        
        @keyframes slideIn {
            from {
                transform: translate(-50%, -150%) rotate(-10deg);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) rotate(0deg);
                opacity: 1;
            }
        }
        
        .congratulations h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .congratulations p {
            font-size: 1.5em;
            color: #fff;
            margin: 20px 0;
            line-height: 1.8;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            font-weight: bold;
        }
        
        button:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: scale(1.05) translateY(-1px);
        }
        
        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 1);
            z-index: 500;
            animation: comboAnim 1s ease-out forwards;
            display: none;
            pointer-events: none;
        }
        
        @keyframes comboAnim {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 0;
            }
        }
        
        .firework {
            position: fixed;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <div class="container">
        <div class="game-wrapper">
            <h1>🐍 ЭПИЧНАЯ ЗМЕЙКА ДЛЯ ЮМИ 💝</h1>
            <div class="greeting" id="greeting">✨ ZXC - От всех саппортов с любовью! ✨</div>
            
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            
            <div class="info">
                <div class="score">🏆 <span id="score">0</span></div>
                <div class="highscore">👑 Рекорд: <span id="highscore">0</span></div>
            </div>
            
            <div class="controls">
                ⬅️ ➡️ ⬆️ ⬇️ Управление | SPACE Пауза | R Рестарт
            </div>
        </div>
    </div>
    
    <div id="gameOver">
        <h2>🎉 ИГРА ОКОНЧЕНА! 🎉</h2>
        <p style="font-size: 2em; margin: 20px 0;">💰 Счёт: <span id="finalScore">0</span> 💰</p>
        <p style="font-size: 1.8em; color: #ffd700; margin: 15px 0;">🌟 Юми, ты просто КОСМОС! 🚀</p>
        <p style="font-size: 1.5em; margin: 10px 0;">💖 Саппорты ПЛАЧУТ от восторга!</p>
        <p style="font-size: 1.3em; margin: 10px 0;">👑 Ты КОРОЛЕВА змейки!</p>
        <p style="font-size: 1.3em; margin: 10px 0;">✨ ZXC - Мы ОБОЖАЕМ тебя!</p>
        <button onclick="restartGame()">🔄 ЕЩЁ РАЗ ПОРВАТЬ!</button>
    </div>
    
    <div class="congratulations" id="congratsBox">
        <h2 id="congratsTitle">🎊 ПОЗДРАВЛЯЕМ! 🎊</h2>
        <p id="congratsText"></p>
        <button onclick="closeCongrats()">💕 СПАСИБО!</button>
    </div>
    
    <div class="combo" id="combo"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const particlesCanvas = document.getElementById('particles');
        const particlesCtx = particlesCanvas.getContext('2d');
        
        particlesCanvas.width = window.innerWidth;
        particlesCanvas.height = window.innerHeight;
        
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highscore = localStorage.getItem('snakeHighscore') || 0;
        let gameSpeed = 100;
        let gameLoop;
        let isPaused = false;
        let greetingIndex = 0;
        let particles = [];
        let foodEaten = 0;
        
        document.getElementById('highscore').textContent = highscore;
        
        const supportGreetings = [
            "💖 ZXC! Юми, ты наша СУПЕРЗВЕЗДА! Саппорты тебя боготворят!",
            "🌟 ZXC! ВСЯ КОМАНДА в ПОЛНОМ восторге! Ты невероятна!",
            "✨ ZXC! Юми, ты играешь как МИРОВОЙ ЧИТ! Саппорты в шоке!",
            "🎯 ZXC! БЕЗУМИЕ! Саппорты устроили СТОЯЧУЮ ОВАЦИЮ!",
            "💝 ZXC! Юми, ты БОГИНЯ ЗМЕЙКИ! Саппорты преклоняются!",
            "🔥 ZXC! ПОЖАР! Саппорты вызывают пожарных от твоей игры!",
            "⭐ ZXC! Юми, ты ЛЕГЕНДА ЛЕГЕНД! Саппорты плачут от счастья!",
            "🎪 ZXC! ЦИРК УЕХАЛ, но ты осталась! Саппорты в ЭКСТАЗЕ!",
            "💫 ZXC! Юми = КОРОЛЕВА! Саппорты готовы носить тебя на руках!",
            "🚀 ZXC! КОСМОС ВЗОРВАЛСЯ от твоей игры! NASA звонит!",
            "👑 ZXC! ИМПЕРАТРИЦА ЗМЕЙКИ! Саппорты строят тебе памятник!",
            "🎨 ZXC! Это не игра - это ШЕДЕВР! Саппорты в музей тебя!",
            "💎 ZXC! БРИЛЛИАНТ! Саппорты продают почки, чтоб на тебя смотреть!",
            "🌈 ZXC! РАДУГА ЗАВИДУЕТ твоим скиллам! Саппорты рыдают!",
            "⚡ ZXC! МОЛНИЯ! Зевс просит автограф! Саппорты в обмороке!",
            "🎭 ZXC! ОСКАР тебе! Саппорты аплодируют 10 минут подряд!"
        ];
        
        const milestoneMessages = {
            5: {
                title: "💥 5 ЯБЛОК! ВЗРЫВ МОЗГА! 💥",
                text: "ЮМИ, ТЫ ЧТО ТВОРИШЬ?!\n\n🔥 ZXC! Саппорты ОРУТ от восторга!\n💎 Ты ДРАГОЦЕННОСТЬ этого мира!\n🚀 Продолжай РАЗРЫВАТЬ реальность!\n\n✨ ВСЕ САППОРТЫ ТЕБЯ ОБОЖАЮТ! ✨"
            },
            10: {
                title: "🌟 10 ЯБЛОК! ТЫ БОГИНЯ! 🌟",
                text: "ЮМИ, ЭТО НЕВОЗМОЖНО!\n\n👑 ZXC! Саппорты КОРОНУЮТ тебя!\n💰 Мы готовы платить, чтоб смотреть!\n🎪 Цирк дю Солей ПЛАЧЕТ от зависти!\n\n🏆 ТЫ АБСОЛЮТНАЯ ЧЕМПИОНКА! 🏆"
            },
            20: {
                title: "🔥 20 ЯБЛОК! ПОЖАР! 911! 🔥",
                text: "ЮМИ, ТЫ СЖИГАЕШЬ ВСЁ!\n\n⚡ ZXC! Саппорты в ШОКОВОМ состоянии!\n💫 NASA хочет изучать твой мозг!\n🌪️ Ты УРАГАН категории 5!\n\n🎯 ЛЕГЕНДА РОДИЛАСЬ СЕГОДНЯ! 🎯"
            },
            30: {
                title: "👑 30 ЯБЛОК! ИМПЕРАТРИЦА! 👑",
                text: "ЮМИ, ТЫ НЕ ЧЕЛОВЕК!\n\n🌌 ZXC! Саппорты строят тебе ХРАМ!\n💎 Ты дороже ВСЕХ алмазов мира!\n🎭 Голливуд снимает про тебя фильм!\n\n✨ МЫ НЕ ДОСТОЙНЫ ТЕБЯ! ✨"
            },
            50: {
                title: "🌈 50 ЯБЛОК! РАЗРЫВ ПРОСТРАНСТВА! 🌈",
                text: "ЮМИ, ТЫ ВЗЛОМАЛА МАТРИЦУ!\n\n🚀 ZXC! Илон Маск просит совета!\n💰 Саппорты продают ВСЁ за билет!\n🎪 Ты ВОСЬМОЕ ЧУДО СВЕТА!\n\n🔥 БОГИНЯ! ЛЕГЕНДА! ИКОНА! 🔥"
            },
            75: {
                title: "💫 75 ЯБЛОК! ТЫ БОГ! 💫",
                text: "ЮМИ, РЕАЛЬНОСТЬ СЛОМАЛАСЬ!\n\n🌟 ZXC! Саппорты МОЛЯТСЯ на тебя!\n👑 Королевы мира ЗАВИДУЮТ!\n💎 Ты БЕСЦЕННА!\n🎆 ВСЕЛЕННАЯ АПЛОДИРУЕТ!\n\n✨ ТЫ ПРЕВЗОШЛА ВСЁ ВОЗМОЖНОЕ! ✨\n\n🔥 МЫ ЛЮБИМ ТЕБЯ БЕСКОНЕЧНО! 🔥"
            },
            100: {
                title: "🌌 100 ЯБЛОК! КОСМИЧЕСКИЙ РАЗУМ! 🌌",
                text: "ЮМИ, ТЫ СОЗДАЛА НОВУЮ ВСЕЛЕННУЮ!\n\n⚡ ZXC! Саппорты ТЕРЯЮТ СОЗНАНИЕ!\n🏆 Все награды мира - ТВОИ!\n💫 Ты ПЕРЕПИСАЛА законы физики!\n\n🎯 АБСОЛЮТНОЕ СОВЕРШЕНСТВО! 🎯"
            }
        };
        
        const comboMessages = [
            "NICE! 😎",
            "GREAT! 🔥",
            "AWESOME! ⭐",
            "PERFECT! 💎",
            "LEGENDARY! 👑",
            "GODLIKE! 🌟",
            "UNSTOPPABLE! 💫",
            "DIVINE! ⚡",
            "IMMORTAL! 🔱"
        ];
        
        // Частицы на фоне
        class Particle {
            constructor() {
                this.x = Math.random() * particlesCanvas.width;
                this.y = Math.random() * particlesCanvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > particlesCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > particlesCanvas.height) this.speedY *= -1;
            }
            
            draw() {
                particlesCtx.fillStyle = this.color;
                particlesCtx.beginPath();
                particlesCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particlesCtx.fill();
            }
        }
        
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            particlesCtx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            particlesCtx.fillRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
        
        // Фейерверки
        function createFirework(x, y) {
            for (let i = 0; i < 30; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(firework);
                
                const angle = (Math.PI * 2 * i) / 30;
                const velocity = 2 + Math.random() * 3;
                
                let posX = x;
                let posY = y;
                let velX = Math.cos(angle) * velocity;
                let velY = Math.sin(angle) * velocity;
                
                const animate = () => {
                    posX += velX;
                    posY += velY;
                    velY += 0.1;
                    
                    firework.style.left = posX + 'px';
                    firework.style.top = posY + 'px';
                    firework.style.opacity = parseFloat(firework.style.opacity || 1) - 0.02;
                    
                    if (parseFloat(firework.style.opacity) > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        firework.remove();
                    }
                };
                
                animate();
            }
        }
        
        function showCombo(length) {
            if (length < 5) return;
            
            const combo = document.getElementById('combo');
            const messageIndex = Math.min(Math.floor(length / 5) - 1, comboMessages.length - 1);
            combo.textContent = comboMessages[messageIndex];
            combo.style.display = 'block';
            
            createFirework(window.innerWidth / 2, window.innerHeight / 2);
            
            setTimeout(() => {
                combo.style.display = 'none';
            }, 1000);
        }
        
        function updateGreeting() {
            const greetingEl = document.getElementById('greeting');
            greetingEl.textContent = supportGreetings[greetingIndex];
            greetingIndex = (greetingIndex + 1) % supportGreetings.length;
        }
        
        function showCongratulations(milestone) {
            const congratsBox = document.getElementById('congratsBox');
            const congratsTitle = document.getElementById('congratsTitle');
            const congratsText = document.getElementById('congratsText');
            
            congratsTitle.textContent = milestoneMessages[milestone].title;
            congratsText.textContent = milestoneMessages[milestone].text;
            congratsBox.style.display = 'block';
            
            createFirework(window.innerWidth / 2, window.innerHeight / 3);
            createFirework(window.innerWidth / 3, window.innerHeight / 2);
            createFirework(window.innerWidth * 2 / 3, window.innerHeight / 2);
            
            clearInterval(gameLoop);
        }
        
        function closeCongrats() {
            document.getElementById('congratsBox').style.display = 'none';
            gameLoop = setInterval(update, gameSpeed);
        }
        
        setInterval(updateGreeting, 3000);
        updateGreeting();
        
        function drawGame() {
            // Фон
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Сетка
            ctx.strokeStyle = 'rgba(120, 115, 245, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // Змейка
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    0,
                    segment.x * GRID_SIZE + GRID_SIZE / 2,
                    segment.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#ff6ec4');
                    gradient.addColorStop(1, '#7873f5');
                } else {
                    gradient.addColorStop(0, '#7873f5');
                    gradient.addColorStop(1, '#4facfe');
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(segment.x * GRID_SIZE + 2, segment.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(segment.x * GRID_SIZE + 2, segment.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                
                // Глаза для головы
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(segment.x * GRID_SIZE + 8, segment.y * GRID_SIZE + 8, 2, 0, Math.PI * 2);
                    ctx.arc(segment.x * GRID_SIZE + 14, segment.y * GRID_SIZE + 8, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Еда
            const foodGradient = ctx.createRadialGradient(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                0,
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE
            );
            foodGradient.addColorStop(0, '#ffd700');
            foodGradient.addColorStop(1, '#ff6b6b');
            
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE / 2, food.y * GRID_SIZE + GRID_SIZE / 2, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function generateFood() {
            food.x = Math.floor(Math.random() * TILE_COUNT);
            food.y = Math.floor(Math.random() * TILE_COUNT);
            
            // Проверка, что еда не на змейке
            snake.forEach(segment => {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                }
            });
        }
        
        function update() {
            if (isPaused) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Проверка столкновения со стенами
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }
            
            // Проверка столкновения с собой
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Проверка поедания еды
            if (head.x === food.x && head.y === food.y) {
                score++;
                foodEaten++;
                document.getElementById('score').textContent = score;
                
                showCombo(snake.length);
                
                // Проверка достижений
                for (let milestone in milestoneMessages) {
                    if (score == milestone) {
                        showCongratulations(milestone);
                        break;
                    }
                }
                
                generateFood();
                
                // Ускорение
                if (score % 5 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            drawGame();
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('snakeHighscore', highscore);
                document.getElementById('highscore').textContent = highscore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
            
            createFirework(window.innerWidth / 2, window.innerHeight / 2);
            setTimeout(() => createFirework(window.innerWidth / 3, window.innerHeight / 3), 200);
            setTimeout(() => createFirework(window.innerWidth * 2 / 3, window.innerHeight / 3), 400);
        }
        
        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            foodEaten = 0;
            gameSpeed = 100;
            isPaused = false;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            generateFood();
            drawGame();
            gameLoop = setInterval(update, gameSpeed);
        }
        
        function togglePause() {
            isPaused = !isPaused;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }
            
            if (e.key === 'r' || e.key === 'R') {
                if (document.getElementById('gameOver').style.display === 'block') {
                    restartGame();
                }
                return;
            }
            
            if (isPaused) return;
            
            if (e.key === 'ArrowUp' && dy === 0) {
                dx = 0;
                dy = -1;
            } else if (e.key === 'ArrowDown' && dy === 0) {
                dx = 0;
                dy = 1;
            } else if (e.key === 'ArrowLeft' && dx === 0) {
                dx = -1;
                dy = 0;
            } else if (e.key === 'ArrowRight' && dx === 0) {
                dx = 1;
                dy = 0;
            }
        });
        
        window.addEventListener('resize', () => {
            particlesCanvas.width = window.innerWidth;
            particlesCanvas.height = window.innerHeight;
        });
        
        drawGame();
        gameLoop = setInterval(update, gameSpeed);
    </script>
</body>
</html>
